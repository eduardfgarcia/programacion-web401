<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroFit | Registro de Paciente</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <div class="container">
        
        <form action="" class="formulario">
            <h1>Formulario de Registro</h1>
            
            <div class="container_form_group">
                <div class="form_group">
                    <label for="nombre">Nombre</label>
                    <input type="text" name="nombre" id="nombre" minlength="3" maxlength="40" placeholder="Ingresa nombres" required >
                </div>
                
                <div class="form_group">
                    <label for="apellido">Apellido</label>
                    <input type="text" name="apellido" id="apellido" minlength="3" maxlength="40" placeholder="Ingresa apellidos" required>
                </div>
            </div>
            
            <label for="email">Correo Electrónico</label>
            <input type="email" name="email" id="email" placeholder="ejemplo@correo.com" required>
           
            <label for="telefono">Teléfono</label>
            <input type="tel" name="telefono" id="telefono" placeholder="Ingresa tu número de teléfono" required>
            
            <label for="birthday">Fecha de Nacimiento</label>
            <input type="date" name="birthday" id="birthday" required>
            
            <label for="password">Contraseña</label>
            <input type="password" name="password" id="password" minlength="8" placeholder="Mínimo 8 caracteres" required>
            
            <label for="confirm-password">Confirmar Contraseña</label>
            <input type="password" name="confirm-password" id="confirm-password" minlength="8" placeholder="Mínimo 8 caracteres" required>
            
            <label for="Intereses">Cuales son tus intereses</label>

            <div class="grid-checkbox">
                <input type="checkbox" name="Informatica" id="informatica">
                <label for="informatica">Informática</label>
                <input type="checkbox" name="Deportes" id="deportes">
                <label for="deportes">Deportes</label>
                <input type="checkbox" name="Musica" id="musica">
                <label for="musica">Música</label>
                <label for="otros">Otros</label>
                <input type="text" name="otros" id="otros" placeholder="Especifica otros intereses">
            </div>

            <h1>Trabajo y experiencia</h1>
            <input type="text" name="ocupacion" id="ocupacion" placeholder="Describe tu experiencia laboral">
            

            <input type="submit" value="Registrar Paciente" class="btn-primary" name="Registrar">
            
            <p class="footer-text">Al registrar, aceptas los términos de uso</p>
        </form>
    </div>
</body>
</html>
